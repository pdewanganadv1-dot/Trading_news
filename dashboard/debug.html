<!DOCTYPE html>
<html>
<head>
    <title>News Debug Test</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a2e; color: #eee; }
        .test { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #0f3d0f; border: 1px solid #4caf50; }
        .error { background: #3d0f0f; border: 1px solid #f44336; }
        .info { background: #0f2a3d; border: 1px solid #2196f3; }
        pre { background: #000; padding: 10px; border-radius: 5px; overflow-x: auto; }
        h2 { color: #4caf50; }
    </style>
</head>
<body>
    <h1>🔍 News Connection Debug</h1>

    <div id="results"></div>

    <script>
        const results = document.getElementById('results');

        function addResult(type, message, data = null) {
            const div = document.createElement('div');
            div.className = `test ${type}`;
            div.innerHTML = `<strong>${type.toUpperCase()}:</strong> ${message}`;
            if (data) {
                div.innerHTML += `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            }
            results.appendChild(div);
        }

        // Test 1: Check server connectivity
        addResult('info', 'Testing server connection...');

        fetch('http://localhost:8000/health')
            .then(r => r.json())
            .then(d => addResult('success', 'Server is UP!', d))
            .catch(e => addResult('error', 'Server connection FAILED: ' + e.message));

        // Test 2: Direct API call
        setTimeout(() => {
            addResult('info', 'Testing news API...');
            fetch('http://localhost:8000/api/v1/news/live/crypto')
                .then(r => r.json())
                .then(d => {
                    addResult('success', `News API returned ${d.count || d.news?.length || 0} articles`);
                    if (d.news && d.news.length > 0) {
                        addResult('info', 'First article:', d.news[0]);
                    }
                })
                .catch(e => addResult('error', 'News API FAILED: ' + e.message));
        }, 500);

        // Test 3: Current page origin
        addResult('info', 'Page URL: ' + window.location.href);
        addResult('info', 'Protocol: ' + window.location.protocol);
    </script>
</body>
</html>
