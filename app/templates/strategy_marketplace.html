<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategy Marketplace</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0f0f14; --bg-secondary: #18181f; --bg-card: #1e1e28;
            --border-color: #2a2a3a; --text-primary: #f0f0f5; --text-secondary: #8888a0;
            --accent-green: #34d399; --accent-red: #f87171; --accent-blue: #4f8cff;
            --accent-purple: #a78bfa; --accent-gold: #fbbf24; --accent-cyan: #38bdf8;
        }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg-primary); color: var(--text-primary); padding: 2rem; min-height: 100vh; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border-color); }
        .header h1 { font-size: 1.5rem; font-weight: 600; }
        .header-actions { display: flex; gap: 1rem; align-items: center; }
        .refresh-btn { background: var(--accent-blue); color: white; border: none; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; font-size: 0.85rem; }
        .last-update { font-size: 0.8rem; color: var(--text-secondary); }
        .controls { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
        .controls select { background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-primary); padding: 0.5rem 0.8rem; border-radius: 8px; font-size: 0.85rem; }
        .controls label { color: var(--text-secondary); font-size: 0.85rem; }
        .strategy-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1rem; }
        .strategy-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; padding: 1.2rem; cursor: pointer; transition: transform 0.2s, border-color 0.2s; }
        .strategy-card:hover { transform: translateY(-3px); border-color: var(--accent-blue); }
        .strategy-card .name { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.2rem; }
        .strategy-card .author { font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
        .strategy-card .desc { font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 0.8rem; line-height: 1.4; }
        .strategy-card .metrics { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.5rem; margin-bottom: 0.8rem; }
        .strategy-card .metric { text-align: center; }
        .strategy-card .metric .val { font-size: 1rem; font-weight: 700; }
        .strategy-card .metric .lbl { font-size: 0.6rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }
        .strategy-card .tags { display: flex; flex-wrap: wrap; gap: 0.3rem; }
        .strategy-card .tag { font-size: 0.65rem; padding: 0.15rem 0.4rem; border-radius: 4px; background: var(--bg-secondary); border: 1px solid var(--border-color); color: var(--text-secondary); }
        .strategy-card .type-badge { display: inline-block; font-size: 0.65rem; padding: 0.2rem 0.5rem; border-radius: 4px; margin-bottom: 0.5rem; }
        .type-trend { background: rgba(52,211,153,0.15); color: var(--accent-green); }
        .type-mean-reversion { background: rgba(79,140,255,0.15); color: var(--accent-blue); }
        .type-momentum { background: rgba(248,113,113,0.15); color: var(--accent-red); }
        .type-options { background: rgba(167,139,250,0.15); color: var(--accent-purple); }
        .type-rotation { background: rgba(251,191,36,0.15); color: var(--accent-gold); }
        .type-flow { background: rgba(56,189,248,0.15); color: var(--accent-cyan); }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; padding: 2rem; max-width: 700px; width: 90%; max-height: 85vh; overflow-y: auto; }
        .modal h2 { font-size: 1.3rem; margin-bottom: 0.3rem; }
        .modal .close { float: right; cursor: pointer; font-size: 1.5rem; color: var(--text-secondary); }
        .modal .close:hover { color: var(--text-primary); }
        .modal-section { margin-top: 1.2rem; }
        .modal-section h3 { font-size: 0.8rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
        .modal-section .rule { font-size: 0.85rem; padding: 0.3rem 0; border-bottom: 1px solid var(--border-color); }
        .modal-section .rule:last-child { border-bottom: none; }
        .backtest-btn { background: var(--accent-green); color: white; border: none; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; font-size: 0.85rem; margin-top: 1rem; width: 100%; }
        .backtest-btn:hover { opacity: 0.9; }
        .backtest-results { margin-top: 1rem; }
        .backtest-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.5rem; margin-top: 0.5rem; }
        .backtest-item { background: var(--bg-secondary); border-radius: 8px; padding: 0.5rem; text-align: center; }
        .backtest-item .val { font-size: 1rem; font-weight: 700; }
        .backtest-item .lbl { font-size: 0.6rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }
        .chart-wrapper { height: 200px; margin-top: 1rem; }
        .loading { text-align: center; padding: 2rem; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="header">
        <h1>Strategy Marketplace</h1>
        <div class="header-actions">
            <span class="last-update" id="lastUpdate">Loading...</span>
            <button class="refresh-btn" onclick="loadStrategies()">↻</button>
        </div>
    </div>

    <div class="controls">
        <label>Filter:</label>
        <select id="typeFilter" onchange="loadStrategies()">
            <option value="">All Types</option>
        </select>
    </div>

    <div class="strategy-grid" id="strategyGrid"><div class="loading">Loading strategies...</div></div>

    <div class="modal-overlay" id="modal">
        <div class="modal">
            <span class="close" onclick="closeModal()">&times;</span>
            <div id="modalContent"><div class="loading">Loading...</div></div>
        </div>
    </div>

    <script>
        let equityChart = null;

        function fmtPct(v) {
            if (v === null || v === undefined) return '--';
            return (v > 0 ? '+' : '') + v + '%';
        }

        function getTypeClass(type) {
            return 'type-' + type.toLowerCase().replace(/[^a-z]/g, '-');
        }

        async function loadStrategies() {
            const filter = document.getElementById('typeFilter').value;
            document.getElementById('lastUpdate').textContent = 'Loading...';

            try {
                const [stratRes, typesRes] = await Promise.all([
                    fetch(`/api/strategy-marketplace/strategies${filter ? '?type_filter='+filter : ''}`),
                    fetch('/api/strategy-marketplace/types'),
                ]);
                const strat = await stratRes.json();
                const types = await typesRes.json();

                const sel = document.getElementById('typeFilter');
                const currentVal = sel.value;
                sel.innerHTML = '<option value="">All Types</option>';
                (types.types || []).forEach(t => {
                    const opt = document.createElement('option');
                    opt.value = t;
                    opt.textContent = t;
                    sel.appendChild(opt);
                });
                sel.value = currentVal;

                renderStrategies(strat.strategies || []);
                document.getElementById('lastUpdate').textContent = `Updated: ${new Date().toLocaleTimeString()}`;
            } catch(e) {
                document.getElementById('strategyGrid').innerHTML = '<div class="loading">Error loading strategies</div>';
            }
        }

        function renderStrategies(strategies) {
            const grid = document.getElementById('strategyGrid');
            if (strategies.length === 0) {
                grid.innerHTML = '<div class="loading">No strategies found</div>';
                return;
            }
            grid.innerHTML = strategies.map(s => `
                <div class="strategy-card" onclick="showDetails('${s.id}')">
                    <span class="type-badge ${getTypeClass(s.type)}">${s.type}</span>
                    <div class="name">${s.name}</div>
                    <div class="author">by ${s.author} &middot; ${s.timeframe} &middot; ${s.popularity} ⭐</div>
                    <div class="desc">${s.description}</div>
                    <div class="metrics">
                        <div class="metric"><div class="val" style="color:${parseFloat(s.metrics.total_return) >= 0 ? 'var(--accent-green)' : 'var(--accent-red)'}">${s.metrics.total_return}</div><div class="lbl">Return</div></div>
                        <div class="metric"><div class="val">${s.metrics.win_rate}</div><div class="lbl">Win Rate</div></div>
                        <div class="metric"><div class="val" style="color:${parseFloat(s.metrics.sharpe) >= 1.5 ? 'var(--accent-green)' : 'var(--accent-gold)'}">${s.metrics.sharpe}</div><div class="lbl">Sharpe</div></div>
                    </div>
                    <div class="tags">${(s.tags||[]).map(t => '<span class="tag">#'+t+'</span>').join('')}</div>
                </div>
            `).join('');
        }

        async function showDetails(id) {
            const modal = document.getElementById('modal');
            const content = document.getElementById('modalContent');
            modal.classList.add('active');
            content.innerHTML = '<div class="loading">Loading...</div>';

            try {
                const res = await fetch(`/api/strategy-marketplace/strategy/${id}`);
                const s = await res.json();
                if (s.error) {
                    content.innerHTML = `<div class="loading">${s.error}</div>`;
                    return;
                }
                content.innerHTML = `
                    <h2>${s.name}</h2>
                    <div style="color:var(--text-secondary);font-size:0.85rem;">by ${s.author} &middot; ${s.type} &middot; ${s.timeframe} &middot; 📋 ${s.copies} copies &middot; ⭐ ${s.rating}</div>
                    
                    <div class="modal-section">
                        <h3>Description</h3>
                        <div style="font-size:0.85rem;line-height:1.5;">${s.description}</div>
                    </div>

                    <div class="modal-section">
                        <h3>Performance</h3>
                        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.5rem;">
                            <div class="backtest-item"><div class="val" style="color:${parseFloat(s.metrics.total_return) >= 0 ? 'var(--accent-green)' : 'var(--accent-red)'}">${s.metrics.total_return}</div><div class="lbl">Return</div></div>
                            <div class="backtest-item"><div class="val">${s.metrics.win_rate}</div><div class="lbl">Win Rate</div></div>
                            <div class="backtest-item"><div class="val">${s.metrics.max_drawdown}</div><div class="lbl">Max DD</div></div>
                            <div class="backtest-item"><div class="val">${s.metrics.sharpe}</div><div class="lbl">Sharpe</div></div>
                            <div class="backtest-item"><div class="val">${s.metrics.trades}</div><div class="lbl">Trades</div></div>
                            <div class="backtest-item"><div class="val">${s.metrics.avg_hold}</div><div class="lbl">Avg Hold</div></div>
                        </div>
                    </div>

                    <div class="modal-section">
                        <h3>Entry Rules</h3>
                        ${(s.entry_rules||[]).map(r => '<div class="rule">📌 ' + r + '</div>').join('')}
                    </div>

                    <div class="modal-section">
                        <h3>Exit Rules</h3>
                        ${(s.exit_rules||[]).map(r => '<div class="rule">🚪 ' + r + '</div>').join('')}
                    </div>

                    <div class="modal-section">
                        <h3>Risk Management</h3>
                        <div style="font-size:0.85rem;">
                            <div>Stop Loss: ${s.risk?.stop_loss || '--'}</div>
                            <div>Position Size: ${s.risk?.position_size || '--'}</div>
                            <div>Max Open: ${s.risk?.max_open || '--'}</div>
                        </div>
                    </div>

                    <button class="backtest-btn" onclick="runBacktest('${id}')">▶ Run Backtest on ${s.name}</button>
                    <div id="backtestResults" class="backtest-results"></div>
                    <div class="chart-wrapper"><canvas id="equityChart"></canvas></div>
                `;
            } catch(e) {
                content.innerHTML = '<div class="loading">Error loading strategy</div>';
            }
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            if (equityChart) { equityChart.destroy(); equityChart = null; }
        }

        async function runBacktest(id) {
            const el = document.getElementById('backtestResults');
            el.innerHTML = '<div class="loading">Running backtest...</div>';

            try {
                const res = await fetch('/api/strategy-marketplace/backtest', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({strategy_id: id, symbol: 'NIFTY', days: 365}),
                });
                const bt = await res.json();
                el.innerHTML = `
                    <h3 style="font-size:0.8rem;color:var(--text-secondary);text-transform:uppercase;letter-spacing:1px;margin-bottom:0.5rem;">Backtest Results</h3>
                    <div class="backtest-grid">
                        <div class="backtest-item"><div class="val" style="color:${bt.total_return_pct >= 0 ? 'var(--accent-green)' : 'var(--accent-red)'}">${bt.total_return_pct}%</div><div class="lbl">Return</div></div>
                        <div class="backtest-item"><div class="val">${bt.win_rate}%</div><div class="lbl">Win Rate</div></div>
                        <div class="backtest-item"><div class="val">${bt.max_drawdown}%</div><div class="lbl">Max DD</div></div>
                        <div class="backtest-item"><div class="val">${bt.profit_factor}</div><div class="lbl">Profit Factor</div></div>
                        <div class="backtest-item"><div class="val">${bt.total_trades}</div><div class="lbl">Trades</div></div>
                        <div class="backtest-item"><div class="val">₹${bt.final_capital?.toLocaleString()}</div><div class="lbl">Final Capital</div></div>
                    </div>
                `;
                renderEquityCurve(bt.equity_curve || []);
            } catch(e) {
                el.innerHTML = '<div style="color:var(--accent-red);">Backtest error</div>';
            }
        }

        function renderEquityCurve(curve) {
            if (!curve || curve.length === 0) return;
            const ctx = document.getElementById('equityChart')?.getContext('2d');
            if (!ctx) return;
            if (equityChart) equityChart.destroy();
            equityChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: curve.map(p => p.date),
                    datasets: [{
                        label: 'Equity',
                        data: curve.map(p => p.equity),
                        borderColor: '#4f8cff',
                        backgroundColor: 'rgba(79,140,255,0.1)',
                        fill: true,
                        tension: 0.3,
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: '#8888a0' } } },
                    scales: {
                        x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8888a0' } },
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8888a0', callback: v => '₹' + v.toLocaleString() } }
                    }
                }
            });
        }

        loadStrategies();
    </script>
</body>
</html>
