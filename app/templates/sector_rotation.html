<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sector Rotation Board</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0f0f14;
            --bg-secondary: #18181f;
            --bg-card: #1e1e28;
            --border-color: #2a2a3a;
            --text-primary: #f0f0f5;
            --text-secondary: #8888a0;
            --accent-green: #34d399;
            --accent-red: #f87171;
            --accent-blue: #4f8cff;
            --accent-purple: #a78bfa;
            --accent-gold: #fbbf24;
            --accent-cyan: #38bdf8;
            --accent-orange: #fb923c;
        }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg-primary); color: var(--text-primary); padding: 2rem; min-height: 100vh; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border-color); }
        .header h1 { font-size: 1.5rem; font-weight: 600; }
        .header-actions { display: flex; gap: 1rem; align-items: center; }
        .refresh-btn { background: var(--accent-blue); color: white; border: none; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; font-size: 0.85rem; }
        .last-update { font-size: 0.8rem; color: var(--text-secondary); }
        .controls { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
        .controls select { background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-primary); padding: 0.5rem 0.8rem; border-radius: 8px; font-size: 0.85rem; }
        .controls label { color: var(--text-secondary); font-size: 0.85rem; }
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .summary-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; padding: 1.25rem; text-align: center; }
        .summary-card .label { font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }
        .summary-card .value { font-size: 1.4rem; font-weight: 700; margin-top: 0.4rem; }
        .summary-card .sub { font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.25rem; }
        .positive { color: var(--accent-green); }
        .negative { color: var(--accent-red); }
        .neutral { color: var(--accent-gold); }
        .card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; padding: 1.5rem; margin-bottom: 1.5rem; }
        .card h2 { font-size: 0.85rem; margin-bottom: 1rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }
        .chart-wrapper { height: 300px; }
        .loading { text-align: center; padding: 3rem; color: var(--text-secondary); }
        .sector-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }
        .sector-card { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 12px; padding: 1.2rem; transition: transform 0.2s; }
        .sector-card:hover { transform: translateY(-2px); border-color: var(--accent-blue); }
        .sector-card .sector-name { font-size: 1rem; font-weight: 600; margin-bottom: 0.3rem; }
        .sector-card .sector-change { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.5rem; }
        .sector-card .sector-detail { font-size: 0.75rem; color: var(--text-secondary); }
        .sector-card .sector-rank { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.3rem; }
        .sector-card .stock-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.5rem; }
        .sector-card .stock-tag { font-size: 0.65rem; padding: 0.15rem 0.4rem; border-radius: 4px; background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-secondary); }
        .rank-badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-weight: 600; }
        .rank-1 { background: rgba(251,191,36,0.2); color: var(--accent-gold); }
        .rank-2 { background: rgba(148,163,184,0.2); color: #94a3b8; }
        .rank-3 { background: rgba(180,83,9,0.2); color: #b45309; }
        .progress-bar { height: 6px; border-radius: 3px; background: var(--bg-primary); margin-top: 0.5rem; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
        .heatmap-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        .heatmap-table th, .heatmap-table td { padding: 0.5rem; text-align: center; border-bottom: 1px solid var(--border-color); }
        .heatmap-table th { color: var(--text-secondary); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; }
        .heatmap-table tr:hover { background: rgba(255,255,255,0.03); }
        .heat-cell { padding: 0.3rem 0.6rem; border-radius: 6px; font-weight: 600; }
        @media (max-width: 768px) { .sector-grid { grid-template-columns: 1fr; } body { padding: 1rem; } }
    </style>
</head>
<body>
    <div class="header">
        <h1>Sector Rotation Board</h1>
        <div class="header-actions">
            <span class="last-update" id="lastUpdate">Loading...</span>
            <button class="refresh-btn" onclick="loadAll()">↻ Refresh</button>
        </div>
    </div>

    <div class="controls">
        <label>Period:</label>
        <select id="periodSelect" onchange="loadAll()">
            <option value="1W">1 Week</option>
            <option value="1M">1 Month</option>
            <option value="6M">6 Months</option>
        </select>
    </div>

    <div class="summary-grid" id="summaryGrid">
        <div class="summary-card"><div class="label">Sectors Tracked</div><div class="value" id="totalSectors">--</div><div class="sub">Sectoral indices</div></div>
        <div class="summary-card"><div class="label">Stocks Mapped</div><div class="value" id="totalStocks">--</div><div class="sub">Nifty 100 stocks</div></div>
        <div class="summary-card"><div class="label">Top Sector</div><div class="value" id="topSector">--</div><div class="sub" id="topSectorChange">--</div></div>
        <div class="summary-card"><div class="label">Bottom Sector</div><div class="value" id="bottomSector">--</div><div class="sub" id="bottomSectorChange">--</div></div>
    </div>

    <div class="card">
        <h2>Sector Performance — <span id="heatmapPeriod">1 Week</span></h2>
        <div class="chart-wrapper"><canvas id="sectorChart"></canvas></div>
    </div>

    <div class="card">
        <h2>Sector Rankings</h2>
        <div class="sector-grid" id="sectorGrid"><div class="loading">Loading...</div></div>
    </div>

    <script>
        let sectorChart = null;

        function fmtPct(v) {
            if (v === null || v === undefined) return '--';
            return (v > 0 ? '+' : '') + v.toFixed(2) + '%';
        }

        function fmtNum(v) {
            if (v === null || v === undefined) return '--';
            return Number(v).toLocaleString('en-IN');
        }

        function getColor(pct) {
            if (pct > 0) {
                const intensity = Math.min(Math.abs(pct) / 5, 1);
                return `rgba(52, 211, 153, ${0.2 + intensity * 0.6})`;
            }
            const intensity = Math.min(Math.abs(pct) / 5, 1);
            return `rgba(248, 113, 113, ${0.2 + intensity * 0.6})`;
        }

        function getTextColor(pct) {
            return pct >= 0 ? 'var(--accent-green)' : 'var(--accent-red)';
        }

        async function loadAll() {
            const period = document.getElementById('periodSelect').value;
            document.getElementById('lastUpdate').textContent = 'Loading...';
            document.getElementById('heatmapPeriod').textContent = period === '1W' ? '1 Week' : period === '1M' ? '1 Month' : '6 Months';

            try {
                const res = await fetch(`/api/sector-rotation/performance?period=${period}`);
                const data = await res.json();

                const sectors = data.sectors || [];
                document.getElementById('totalSectors').textContent = data.total_sectors || 0;
                document.getElementById('totalStocks').textContent = data.total_stocks || 0;

                if (sectors.length > 0) {
                    document.getElementById('topSector').textContent = sectors[0].sector;
                    document.getElementById('topSectorChange').textContent = fmtPct(sectors[0].change_pct);
                    document.getElementById('topSectorChange').className = 'sub ' + (sectors[0].change_pct >= 0 ? 'positive' : 'negative');

                    const last = sectors[sectors.length - 1];
                    document.getElementById('bottomSector').textContent = last.sector;
                    document.getElementById('bottomSectorChange').textContent = fmtPct(last.change_pct);
                    document.getElementById('bottomSectorChange').className = 'sub ' + (last.change_pct >= 0 ? 'positive' : 'negative');
                }

                renderSectorCards(sectors);
                renderSectorChart(sectors);
                document.getElementById('lastUpdate').textContent = 'Updated: ' + new Date().toLocaleTimeString();
            } catch(e) {
                document.getElementById('lastUpdate').textContent = 'Error loading data';
            }
        }

        function renderSectorCards(sectors) {
            const grid = document.getElementById('sectorGrid');
            if (!sectors || sectors.length === 0) {
                grid.innerHTML = '<div class="loading">No sector data available</div>';
                return;
            }

            const maxAbs = Math.max(...sectors.map(s => Math.abs(s.change_pct)), 0.01);

            grid.innerHTML = sectors.map(s => {
                const pct = s.change_pct;
                const barWidth = Math.abs(pct) / maxAbs * 100;
                const barColor = pct >= 0 ? 'var(--accent-green)' : 'var(--accent-red)';
                const rankClass = s.rank === 1 ? 'rank-1' : s.rank === 2 ? 'rank-2' : s.rank === 3 ? '' : '';

                return `<div class="sector-card">
                    <div style="display:flex;justify-content:space-between;align-items:center;">
                        <div class="sector-name">${s.sector}</div>
                        <span class="rank-badge ${rankClass}">#${s.rank}</span>
                    </div>
                    <div class="sector-change" style="color:${getTextColor(pct)}">${fmtPct(pct)}</div>
                    <div class="sector-detail">${s.index_name} &middot; Current: ${fmtNum(s.current)}</div>
                    <div class="progress-bar"><div class="progress-fill" style="width:${barWidth}%;background:${barColor};"></div></div>
                    ${s.stocks && s.stocks.length > 0 ? `<div class="stock-tags">${s.stocks.slice(0, 10).map(st => `<span class="stock-tag">${st.symbol}</span>`).join('')}${s.stocks.length > 10 ? `<span class="stock-tag">+${s.stocks.length - 10}</span>` : ''}</div>` : ''}
                </div>`;
            }).join('');
        }

        function renderSectorChart(sectors) {
            if (!sectors || sectors.length === 0) return;
            const labels = sectors.map(s => s.sector);
            const values = sectors.map(s => s.change_pct);
            const colors = values.map(v => v >= 0 ? 'rgba(52, 211, 153, 0.7)' : 'rgba(248, 113, 113, 0.7)');
            const borderColors = values.map(v => v >= 0 ? '#34d399' : '#f87171');

            const ctx = document.getElementById('sectorChart').getContext('2d');
            if (sectorChart) sectorChart.destroy();
            sectorChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels,
                    datasets: [{
                        label: 'Change %',
                        data: values,
                        backgroundColor: colors,
                        borderColor: borderColors,
                        borderWidth: 1,
                        borderRadius: 4,
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                    },
                    scales: {
                        x: {
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#8888a0', callback: v => v + '%' }
                        },
                        y: {
                            grid: { display: false },
                            ticks: { color: '#8888a0', font: { size: 10 } }
                        }
                    }
                }
            });
        }

        loadAll();
        setInterval(loadAll, 120000);
    </script>
</body>
</html>
