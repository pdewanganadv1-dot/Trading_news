services:
  - type: web
    name: trading-dashboard
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: PERSISTENT_DIR
        value: /data
